<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyx's Blog - Security & Hacking Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ff41;
            --secondary: #ffff00;
            --dark: #0d0d0d;
            --darker: #1a1a1a;
            --accent: #ff006e;
            --text: #e0e0e0;
            --muted: #888888;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: var(--primary);
            font-family: 'Courier New', 'Consolas', monospace;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 65, 0.03) 0px,
                rgba(0, 255, 65, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        .content {
            position: relative;
            z-index: 2;
        }

        header {
            padding: 60px 20px 40px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 0.9em;
            color: var(--muted);
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3.5em;
            font-weight: 900;
            margin-bottom: 10px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.1em;
            color: var(--secondary);
            margin-bottom: 5px;
            font-style: italic;
        }

        .subtitle {
            font-size: 0.85em;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        nav {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        nav button {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav button:hover,
        nav button.active {
            background: var(--primary);
            color: var(--dark);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
            transform: translateY(-2px);
        }

        .posts-section {
            margin-top: 40px;
        }

        .section-title {
            color: var(--secondary);
            margin-bottom: 30px;
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--primary);
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .post-card {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid var(--primary);
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.1), transparent);
            transition: left 0.5s;
        }

        .post-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
            border-color: var(--secondary);
        }

        .post-card:hover::before {
            left: 100%;
        }

        .post-card a {
            position: relative;
            z-index: 1;
        }

        .post-title {
            color: var(--primary);
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            text-decoration: none;
            display: block;
            transition: color 0.3s;
        }

        .post-card:hover .post-title {
            color: var(--secondary);
        }

        .post-category {
            display: inline-block;
            background: rgba(0, 255, 65, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            font-size: 0.75em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--primary);
        }

        .post-meta {
            color: var(--muted);
            font-size: 0.85em;
            margin-bottom: 12px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .post-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .post-excerpt {
            color: var(--text);
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .read-more {
            color: var(--secondary);
            font-size: 0.9em;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .read-more:hover {
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 40px 20px;
        }

        footer {
            background: rgba(13, 13, 13, 0.8);
            border-top: 2px solid var(--primary);
            padding: 30px 20px;
            text-align: center;
            color: var(--muted);
            margin-top: 50px;
            font-size: 0.9em;
        }

        .footer-text {
            margin-bottom: 10px;
        }

        .footer-divider {
            color: var(--primary);
            margin: 15px 0;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2em;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }

            nav {
                gap: 10px;
            }

            nav button {
                padding: 6px 12px;
                font-size: 0.8em;
            }
        }

        /* Loading animation */
        .loading {
            color: var(--primary);
            text-align: center;
            padding: 40px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="content">
        <header>
            <div class="logo">[ SECURITY & HACKING ]</div>
            <h1>NYX'S BLOG</h1>
            <p class="tagline">CEH | Penetration Testing | Security Research</p>
            <p class="subtitle">Documenting the journey to ethical hacking mastery</p>
        </header>

        <div class="container">
            <nav>
                <button class="filter-btn active" data-category="all">All Posts</button>
                <button class="filter-btn" data-category="ceh">CEH</button>
                <button class="filter-btn" data-category="pentest">Pentest</button>
                <button class="filter-btn" data-category="tools">Tools</button>
                <button class="filter-btn" data-category="lab">Lab Setup</button>
            </nav>

            <div class="posts-section">
                <div class="section-title">Recent Posts</div>
                <div class="posts-grid" id="postsContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading posts...</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <div class="footer-text">[ NYX'S BLOG v2.0 ]</div>
            <div class="footer-divider">≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡</div>
            <div class="footer-text">Built with ❤️ | No tracking, no ads, just content</div>
            <div class="footer-text">Hosted on GitHub Pages</div>
        </footer>
    </div>

    <script>
        let allPosts = [];

        // Load and display posts
        fetch('posts.json')
            .then(response => response.json())
            .then(posts => {
                allPosts = posts;
                displayPosts(posts);
                setupFilters();
            })
            .catch(error => {
                console.error('Error loading posts:', error);
                document.getElementById('postsContainer').innerHTML = 
                    '<div class="empty-state">Error loading posts. Check posts.json file.</div>';
            });

        function displayPosts(posts) {
            const container = document.getElementById('postsContainer');
            
            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-state">No posts found. Start writing!</div>';
                return;
            }

            container.innerHTML = posts
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .map(post => `
                    <div class="post-card">
                        ${post.category ? `<div class="post-category">${post.category}</div>` : ''}
                        <a href="posts/${post.filename}" class="post-title">${post.title}</a>
                        <div class="post-meta">
                            <span>📅 ${formatDate(post.date)}</span>
                            <span>✍️ ${post.author}</span>
                        </div>
                        <p class="post-excerpt">${post.excerpt}</p>
                        <a href="posts/${post.filename}" class="read-more">Read More →</a>
                    </div>
                `)
                .join('');
        }

        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const category = btn.dataset.category;
                    const filtered = category === 'all' 
                        ? allPosts 
                        : allPosts.filter(p => p.category === category);
                    
                    displayPosts(filtered);
                });
            });
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }
    </script>
</body>
</html>
